<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">🎾 <span id="team-name-display">Mijn Tennissteam</span></h1>
        <button class="icon-btn" data-action="open-settings" title="Instellingen">⚙️</button>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="matches">Wedstrijden</button>
        <button class="tab-btn" data-tab="players">Speelsters</button>
        <button class="tab-btn" data-tab="standings">Stand</button>
      </nav>
    </header>

    <main>
      <!-- Wedstrijden tab -->
      <div id="tab-matches" class="tab-content active">
        <div id="team-photo-area"></div>
        <div class="content-header">
          <h2>Wedstrijden</h2>
          <button class="btn-primary" data-action="add-match">+ Toevoegen</button>
        </div>
        <div id="matches-list"></div>
      </div>

      <!-- Speelsters tab -->
      <div id="tab-players" class="tab-content">
        <div class="content-header">
          <h2>Speelsters</h2>
          <button class="btn-primary" data-action="add-player">+ Toevoegen</button>
        </div>
        <div id="players-list"></div>
      </div>

      <!-- Stand tab -->
      <div id="tab-standings" class="tab-content">
        <div id="standings-knltb-btn"></div>
        <div class="content-header">
          <h2>Competitiestand</h2>
          <button class="btn-primary" data-action="add-standing">+ Ploeg</button>
        </div>
        <div id="standings-table"></div>
      </div>
    </main>
  </div>

  <!-- Match detail overlay -->
  <div id="overlay-match" class="overlay hidden">
    <div class="overlay-panel">
      <div class="overlay-header">
        <h2 id="overlay-title">Wedstrijd</h2>
        <button class="icon-btn" data-action="close-overlay">✕</button>
      </div>
      <div id="overlay-content" class="overlay-body"></div>
    </div>
  </div>

  <!-- Modal: Wedstrijd toevoegen / bewerken -->
  <div id="modal-match" class="modal hidden">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="modal-match-title">Wedstrijd toevoegen</h3>
        <button class="icon-btn modal-close" data-modal="modal-match">✕</button>
      </div>
      <form id="form-match" class="modal-body">
        <input type="hidden" name="matchId">
        <div class="form-group">
          <label>Datum *</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tijd</label>
            <input type="time" name="time">
          </div>
          <div class="form-group">
            <label>Thuis of uit? *</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="isHome" value="true" checked> Thuis
              </label>
              <label class="radio-label">
                <input type="radio" name="isHome" value="false"> Uit
              </label>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Tegenstander *</label>
          <input type="text" name="opponent" placeholder="Naam tegenstander" required>
        </div>
        <div class="form-group" id="location-field">
          <label>Locatie (bij uitwedstrijden)</label>
          <input type="text" name="location" placeholder="Clubnaam / adres">
        </div>
        <div class="form-group">
          <label>Notities</label>
          <textarea name="notes" rows="2" placeholder="Bijv. 'Vergeet de ballen niet!'"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary modal-close" data-modal="modal-match">Annuleren</button>
          <button type="submit" class="btn-primary">Opslaan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Speelster toevoegen -->
  <div id="modal-player" class="modal hidden">
    <div class="modal-dialog modal-dialog-sm">
      <div class="modal-header">
        <h3>Speelster toevoegen</h3>
        <button class="icon-btn modal-close" data-modal="modal-player">✕</button>
      </div>
      <form id="form-player" class="modal-body">
        <div class="form-group">
          <label>Naam *</label>
          <input type="text" name="name" placeholder="Naam speelster" required autofocus>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary modal-close" data-modal="modal-player">Annuleren</button>
          <button type="submit" class="btn-primary">Toevoegen</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Speelster bewerken -->
  <div id="modal-edit-player" class="modal hidden">
    <div class="modal-dialog modal-dialog-sm">
      <div class="modal-header">
        <h3>Speelster bewerken</h3>
        <button class="icon-btn modal-close" data-modal="modal-edit-player">✕</button>
      </div>
      <form id="form-edit-player" class="modal-body">
        <input type="hidden" name="playerId">
        <div class="form-group">
          <label>Naam *</label>
          <input type="text" name="name" placeholder="Naam speelster" required>
        </div>
        <div class="form-group">
          <label>Foto</label>
          <label class="photo-upload-area">
            <div id="edit-player-photo-preview" class="photo-preview-initials">?</div>
            <input type="file" name="photo" accept="image/*" id="edit-player-photo-input">
            <span class="photo-upload-label">Klik om een foto te kiezen</span>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary modal-close" data-modal="modal-edit-player">Annuleren</button>
          <button type="submit" class="btn-primary">Opslaan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Instellingen -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-dialog modal-dialog-sm">
      <div class="modal-header">
        <h3>Instellingen</h3>
        <button class="icon-btn modal-close" data-modal="modal-settings">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Teamnaam</label>
          <input type="text" id="input-teamname" placeholder="Naam van je team">
        </div>
        <div class="form-group">
          <label>KNLTB competitie-link</label>
          <input type="text" id="input-knltb-url" placeholder="https://mijnknltb.toernooi.nl/...">
        </div>
        <div class="form-group">
          <label>Teamfoto</label>
          <label class="photo-upload-area">
            <div id="team-photo-settings-preview"></div>
            <input type="file" id="input-team-photo" accept="image/*">
            <span class="photo-upload-label">Klik om een teamfoto te kiezen</span>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary modal-close" data-modal="modal-settings">Annuleren</button>
          <button type="button" class="btn-primary" data-action="save-settings">Opslaan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Stand invoeren -->
  <div id="modal-standing" class="modal hidden">
    <div class="modal-dialog modal-dialog-sm">
      <div class="modal-header">
        <h3 id="modal-standing-title">Ploeg toevoegen</h3>
        <button class="icon-btn modal-close" data-modal="modal-standing">✕</button>
      </div>
      <form id="form-standing" class="modal-body">
        <input type="hidden" name="standingId">
        <div class="form-group">
          <label>Ploegnaam *</label>
          <input type="text" name="team" placeholder="Naam van de ploeg" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Gewonnen</label>
            <input type="number" name="won" min="0" value="0">
          </div>
          <div class="form-group">
            <label>Gelijk</label>
            <input type="number" name="draw" min="0" value="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Verloren</label>
            <input type="number" name="lost" min="0" value="0">
          </div>
          <div class="form-group">
            <label>Punten</label>
            <input type="number" name="points" min="0" value="0">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary modal-close" data-modal="modal-standing">Annuleren</button>
          <button type="submit" class="btn-primary">Opslaan</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
